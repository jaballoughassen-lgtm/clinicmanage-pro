name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main # Assurez-vous que c'est le nom de votre branche principale

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build Web
        run: npx expo export --platform web

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # Dossier généré par Expo
          branch: gh-pages # Branche où le site sera hébergé
